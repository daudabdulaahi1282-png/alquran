<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Reciters / Just Al-Quran Attendance Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0a1628 100%); min-height: 100vh; color: #e0e0e0; padding-bottom: 30px; }
        
        .header { background: linear-gradient(90deg, #0d4a3a, #1a6b50, #0d4a3a); padding: 20px; text-align: center; border-bottom: 3px solid #d4af37; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header h1 { font-size: 1.8rem; color: #d4af37; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .header .arabic-title { font-size: 2rem; color: #ffffff; margin-bottom: 5px; }
        .header p { color: #a8d5ba; font-size: 0.95rem; }

        .time-bar { background: #0a2a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; flex-wrap: wrap; gap: 10px; }
        .time-bar .current-time { font-size: 1.3rem; color: #d4af37; font-weight: bold; }
        .time-bar .date-display { font-size: 1rem; color: #a8d5ba; }
        .time-bar .open-close { display: flex; gap: 20px; align-items: center; }
        .time-bar .open-close span { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }
        .open-indicator { background: #2ecc71; color: #fff; animation: pulse 2s infinite; }
        .closed-indicator { background: #e74c3c; color: #fff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .admin-section { background: rgba(255,255,255,0.05); margin: 15px auto; max-width: 900px; padding: 15px 20px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.3); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .admin-section label { color: #d4af37; font-weight: bold; }
        .admin-section input { padding: 10px 15px; border: 2px solid #1a6b50; border-radius: 8px; background: #0a2a1a; color: #fff; font-size: 1rem; flex:1; min-width: 200px; }
        .admin-section input:focus { outline: none; border-color: #d4af37; }
        .admin-btn { padding: 10px 20px; background: #d4af37; color: #0a1628; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .admin-btn:hover { background: #f0c94b; transform: scale(1.05); }
        .admin-controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; width: 100%; margin-top: 10px; }
        .admin-status { width: 100%; text-align: center; padding: 5px; font-size: 0.85rem; border-radius: 5px; }
        .admin-status.success { color: #2ecc71; background: rgba(46,204,113,0.1); }
        .admin-status.error { color: #e74c3c; background: rgba(231,76,60,0.1); }

        .tabs-container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .tab-buttons { display: flex; gap: 10px; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; padding: 10px 5px 0 5px; margin-bottom: -2px; scrollbar-width: thin; scrollbar-color: #d4af37 rgba(255,255,255,0.05); }
        .tab-buttons::-webkit-scrollbar { height: 5px; }
        .tab-buttons::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .tab-buttons::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        .tab-btn { padding: 12px 20px; background: rgba(255,255,255,0.08); color: #a8d5ba; border: 2px solid rgba(212,175,55,0.2); border-bottom: none; border-radius: 10px 10px 0 0; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: 0.3s; flex-shrink: 0; }
        .tab-btn:hover { background: rgba(26,107,80,0.4); color: #d4af37; }
        .tab-btn.active { background: #0d4a3a; color: #d4af37; border-color: #d4af37; border-bottom: 2px solid #0d4a3a; z-index: 2; }
        .tab-btn.locked { border-color: #e74c3c; color: #e74c3c; }

        .tab-content { background: #0d4a3a; border: 2px solid #d4af37; border-radius: 0 0 10px 10px; padding: 20px; display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .participant-form { max-width: 500px; margin: 0 auto; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.3); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #1a6b50; border-radius: 6px; background: #0a2a1a; color: #fff; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #d4af37; }
        .submit-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #2ecc71, #27ae60); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(46,204,113,0.3); }
        .submit-btn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        .form-status { margin-top: 10px; text-align: center; padding: 8px; border-radius: 5px; display: none; }
        .form-status.success { display: block; background: rgba(46,204,113,0.2); color: #2ecc71; }
        .form-status.error { display: block; background: rgba(231,76,60,0.2); color: #e74c3c; }

        .summary-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; flex-wrap: wrap; }
        .summary-item { text-align: center; }
        .summary-item .count { font-size: 1.5rem; font-weight: bold; }
        .summary-item .label { font-size: 0.8rem; color: #a8d5ba; }
        .count.total { color: #d4af37; } .count.pending { color: #3498db; } .count.confirmed { color: #2ecc71; } .count.absent { color: #e74c3c; } .count.late { color: #f39c12; }

        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 15px; }
        .admin-card { background: rgba(0,0,0,0.25); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 15px; transition: 0.3s; }
        .admin-card:hover { border-color: #d4af37; }
        .admin-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .admin-card-id { background: #d4af37; color: #0a1628; padding: 3px 10px; border-radius: 15px; font-weight: bold; font-size: 0.85rem; }
        .admin-card-name { color: #a8d5ba; }
        .admin-card-details { color: #888; font-size: 0.9rem; margin: 8px 0; line-height: 1.6; }
        .admin-card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .verify-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .verify-btn.present { background: #2ecc71; color: #fff; }
        .verify-btn.absent { background: #e74c3c; color: #fff; }
        .verify-btn.late { background: #f39c12; color: #fff; }
        .verify-btn:hover { transform: scale(1.05); }
        .verify-btn.verified { opacity: 0.6; cursor: not-allowed; transform: none; }
        .no-data { text-align: center; color: #888; padding: 40px 20px; font-style: italic; }

        .export-section { text-align: center; margin-top: 15px; }
        .export-btn { padding: 10px 25px; background: linear-gradient(90deg, #d4af37, #f0c94b); color: #0a1628; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        .export-btn:hover { transform: scale(1.05); }
        .reset-btn { background: linear-gradient(90deg, #e74c3c, #c0392b); color: #fff; }

        .lookup-form { max-width: 500px; margin: 0 auto; }
        .lookup-result { margin-top: 15px; padding: 12px; background: rgba(212,175,55,0.1); border-radius: 6px; display: none; }
        .lookup-result.show { display: block; animation: fadeIn 0.3s; }
        .lookup-result p { margin: 5px 0; font-size: 0.9rem; }
        .lookup-result strong { color: #d4af37; }

        .log-section { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .log-container { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 15px; max-height: 300px; overflow-y: auto; }
        .log-container h3 { color: #d4af37; margin-bottom: 10px; }
        .log-entry { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        .log-entry .log-time { color: #d4af37; font-weight: bold; }

        .footer { text-align: center; padding: 20px; color: #666; font-size: 0.85rem; border-top: 1px solid rgba(212,175,55,0.2); margin-top: 30px; }
        .footer .bismillah { color: #d4af37; font-size: 1.2rem; margin-bottom: 5px; }

        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: #fff; font-weight: bold; z-index: 1000; transform: translateX(400px); transition: transform 0.5s ease; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .notification.show { transform: translateX(0); }
        .notification.success { background: #2ecc71; } .notification.error { background: #e74c3c; } .notification.info { background: #3498db; }

        /* Admin Auth Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #0d4a3a; padding: 25px; border-radius: 12px; border: 2px solid #d4af37; width: 90%; max-width: 350px; text-align: center; }
        .modal-content h3 { color: #d4af37; margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #1a6b50; border-radius: 6px; background: #0a2a1a; color: #fff; }
        .modal-content input:focus { outline: none; border-color: #d4af37; }
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .modal-btn.unlock { background: #2ecc71; color: #fff; }
        .modal-btn.cancel { background: #555; color: #fff; }
        .modal-error { color: #e74c3c; margin-top: 10px; display: none; font-size: 0.9rem; }

        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #0a2a1a; } ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        @media (max-width: 768px) { .header h1 { font-size: 1.3rem; } .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="notification" id="notification"></div>

    <!-- Admin Auth Modal -->
    <div class="modal-overlay" id="adminAuthModal">
        <div class="modal-content">
            <h3>🔒 Admin Access Required</h3>
            <p style="color:#a8d5ba; margin-bottom:10px; font-size:0.9rem;">Enter the admin password to view the verification panel.</p>
            <input type="password" id="adminPasswordInput" placeholder="Password...">
            <div class="modal-actions">
                <button class="modal-btn unlock" onclick="checkAdminPassword()">🔓 Unlock</button>
                <button class="modal-btn cancel" onclick="closeAdminModal()">Cancel</button>
            </div>
            <div class="modal-error" id="passwordError">❌ Incorrect password!</div>
        </div>
    </div>

    <div class="header">
        <div class="arabic-title">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <h1>📖 Quran Reciters / Just Al-Quran Attendance Web</h1>
        <p>Participants submit daily Juz + Session | Admin verifies attendance 🔒</p>
    </div>

    <div class="time-bar">
        <div>
            <div class="date-display" id="dateDisplay"></div>
            <div class="current-time" id="currentTime"></div>
        </div>
        <div class="open-close">
            <span id="openTimeDisplay">Open: --:--</span>
            <span id="closeTimeDisplay">Close: --:--</span>
            <span id="statusIndicator" class="open-indicator">● OPEN</span>
        </div>
    </div>

    <div class="admin-section">
        <label>📧 Admin Email:</label>
        <input type="email" id="adminEmail" placeholder="admin@quran.com">
        <button class="admin-btn" onclick="verifyEmail()">Save</button>
        <div class="admin-controls">
            <label style="color:#a8d5ba;">Auto Open:</label>
            <input type="time" id="autoOpenTime" value="08:00" style="width:130px;">
            <label style="color:#a8d5ba;">Auto Close:</label>
            <input type="time" id="autoCloseTime" value="17:00" style="width:130px;">
            <button class="admin-btn" onclick="saveAutoTime()" style="background:#1a6b50;">💾 Save Times</button>
        </div>
        <div class="admin-controls" style="margin-top:15px; padding-top:10px; border-top:1px solid rgba(212,175,55,0.2);">
            <label style="color:#d4af37;">🔑 Admin Password:</label>
            <input type="password" id="newAdminPass" placeholder="Set/Change (default: 1234)">
            <button class="admin-btn" onclick="changeAdminPassword()" style="background:#3498db;">Update Password</button>
        </div>
        <div class="admin-status" id="emailStatus"></div>
    </div>

    <div class="tabs-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('participant', this)">📝 Participant Portal</button>
            <button class="tab-btn locked" onclick="tryAccessAdmin(this)">🔒 Admin Verification</button>
            <button class="tab-btn" onclick="switchTab('lookup', this)">🔍 Lookup & Profile</button>
        </div>

        <!-- TAB 1: Participant Submission -->
        <div class="tab-content active" id="tab-participant">
            <h3 style="color:#d4af37; margin-bottom:5px; text-align:center;">📝 Submit Today's Quran Recitation Plan</h3>
            <p style="color:#a8d5ba; font-size:0.85rem; text-align:center; margin-bottom:20px;">Choose your paired Juz & session. <strong>1 submission per day allowed.</strong></p>
            
            <div class="participant-form">
                <div class="form-group">
                    <label>👤 Your ID (1-100)</label>
                    <input type="number" id="partId" min="1" max="100" placeholder="Enter your assigned ID">
                </div>
                <div class="form-group">
                    <label>📖 Today's Paired Juz</label>
                    <select id="partJuz">
                        <option value="">Select Juz Pair...</option>
                        <option value="1&2">1 & 2</option><option value="3&4">3 & 4</option><option value="5&6">5 & 6</option>
                        <option value="7&8">7 & 8</option><option value="9&10">9 & 10</option><option value="11&12">11 & 12</option>
                        <option value="13&14">13 & 14</option><option value="15&16">15 & 16</option><option value="17&18">17 & 18</option>
                        <option value="19&20">19 & 20</option><option value="21&22">21 & 22</option><option value="23&24">23 & 24</option>
                        <option value="25&26">25 & 26</option><option value="27&28">27 & 28</option><option value="29&30">29 & 30</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🌅 Session</label>
                    <select id="partSession">
                        <option value="">Select Session...</option>
                        <option value="AS">🌙 AS Only</option>
                        <option value="AM">☀️ AM Only</option>
                        <option value="AS&AM">🌙☀️ AS & AM</option>
                    </select>
                </div>
                <button class="submit-btn" id="submitBtn" onclick="submitDailyEntry()">📤 Submit My Plan</button>
                <div class="form-status" id="formStatus"></div>
            </div>
        </div>

        <!-- TAB 2: Admin Verification -->
        <div class="tab-content" id="tab-admin">
            <h3 style="color:#d4af37; margin-bottom:5px; text-align:center;">✅ Admin Verification Panel</h3>
            <p style="color:#a8d5ba; font-size:0.85rem; text-align:center; margin-bottom:15px;">Verify attendance based on participant submissions. Mark Present, Absent, or Late.</p>
            
            <div class="summary-bar" id="adminSummary"></div>
            <div class="admin-grid" id="adminGrid"></div>
            
            <div class="export-section">
                <button class="export-btn" onclick="exportTodayData()">📥 Export Today's Data</button>
                <button class="export-btn reset-btn" onclick="resetTodayData()">🗑️ Clear Today's Data</button>
            </div>
        </div>

        <!-- TAB 3: Lookup & Profile -->
        <div class="tab-content" id="tab-lookup">
            <h3 style="color:#d4af37; margin-bottom:5px; text-align:center;">🔍 Lookup Status & Manage Profile</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-top:15px;">
                <div style="background:rgba(0,0,0,0.25); padding:20px; border-radius:10px; border:1px solid rgba(212,175,55,0.3);">
                    <h3 style="color:#d4af37; margin-bottom:10px;">🔍 Check Attendance</h3>
                    <input type="text" id="lookupInput" placeholder="Enter ID or Name..." style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1a6b50; border-radius:6px; background:#0a2a1a; color:#fff;">
                    <button class="admin-btn" onclick="lookupReciter()" style="width:100%;">Check Status</button>
                    <div class="lookup-result" id="lookupResult"></div>
                </div>
                <div style="background:rgba(0,0,0,0.25); padding:20px; border-radius:10px; border:1px solid rgba(212,175,55,0.3);">
                    <h3 style="color:#d4af37; margin-bottom:10px;">📝 Register / Update Profile</h3>
                    <input type="text" id="profName" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:8px; border:2px solid #1a6b50; border-radius:6px; background:#0a2a1a; color:#fff;">
                    <input type="email" id="profEmail" placeholder="Email Address" style="width:100%; padding:10px; margin-bottom:8px; border:2px solid #1a6b50; border-radius:6px; background:#0a2a1a; color:#fff;">
                    <input type="number" id="profId" min="1" max="30" placeholder="Assigned ID" style="width:100%; padding:10px; margin-bottom:8px; border:2px solid #1a6b50; border-radius:6px; background:#0a2a1a; color:#fff;">
                    <button class="admin-btn" onclick="saveProfile()" style="width:100%; background:#1a6b50;">Save Profile</button>
                </div>
            </div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-container">
            <h3>📜 Activity Log</h3>
            <div id="activityLog"></div>
        </div>
    </div>

    <div class="footer">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <p>Quran Reciters / Just Al-Quran Attendance Web © 2026</p>
        <p>May Allah accept your recitation 🤲</p>
    </div>

    <script>
        // ===== GLOBAL STATE =====
        let autoOpen = localStorage.getItem('autoOpen') || '08:00';
        let autoClose = localStorage.getItem('autoClose') || '17:00';
        let adminEmail = localStorage.getItem('adminEmail') || '';
        let submissions = JSON.parse(localStorage.getItem('submissions')) || {};
        let profiles = JSON.parse(localStorage.getItem('profiles')) || {};
        
        // Admin Auth
        let adminPassword = localStorage.getItem('adminPassword') || '1234';
        let isAdminAuth = sessionStorage.getItem('isAdminAuth') === 'true';
        
        document.getElementById('autoOpenTime').value = autoOpen;
        document.getElementById('autoCloseTime').value = autoClose;
        if (adminEmail) document.getElementById('adminEmail').value = adminEmail;

        const getTodayKey = () => new Date().toISOString().split('T')[0];

        // ===== CLOCK & TIME =====
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour12: true });
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('openTimeDisplay').textContent = 'Open: ' + autoOpen;
            document.getElementById('closeTimeDisplay').textContent = 'Close: ' + autoClose;
            const currentHM = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            const indicator = document.getElementById('statusIndicator');
            if (currentHM >= autoOpen && currentHM <= autoClose) {
                indicator.textContent = '● OPEN'; indicator.className = 'open-indicator';
            } else {
                indicator.textContent = '● CLOSED'; indicator.className = 'closed-indicator';
            }
        }
        setInterval(updateClock, 1000); updateClock();

        function saveAutoTime() {
            autoOpen = document.getElementById('autoOpenTime').value;
            autoClose = document.getElementById('autoCloseTime').value;
            localStorage.setItem('autoOpen', autoOpen); localStorage.setItem('autoClose', autoClose);
            showNotification('Auto times saved!', 'success');
            addLog(`Auto times updated: ${autoOpen} → ${autoClose}`);
        }

        function verifyEmail() {
            const email = document.getElementById('adminEmail').value.trim();
            const statusEl = document.getElementById('emailStatus');
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(email)) { statusEl.textContent = '⚠️ Valid email required!'; statusEl.className = 'admin-status error'; return; }
            adminEmail = email; localStorage.setItem('adminEmail', email);
            statusEl.textContent = '✅ Admin email saved'; statusEl.className = 'admin-status success';
            addLog('Admin email updated');
        }

        // ===== TAB SWITCHING =====
        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            btn.classList.add('active');
            if (tabName === 'admin') renderAdminPanel();
            if (tabName === 'participant') checkParticipantStatus();
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        // ===== ADMIN AUTH =====
        function tryAccessAdmin(btn) {
            if (isAdminAuth) {
                switchTab('admin', btn);
            } else {
                document.getElementById('adminAuthModal').style.display = 'flex';
                document.getElementById('adminPasswordInput').focus();
            }
        }

        function checkAdminPassword() {
            const input = document.getElementById('adminPasswordInput').value;
            if (input === adminPassword) {
                sessionStorage.setItem('isAdminAuth', 'true');
                isAdminAuth = true;
                document.getElementById('adminAuthModal').style.display = 'none';
                switchTab('admin', document.querySelector('.tab-btn:nth-child(2)'));
                showNotification('Admin access granted', 'success');
            } else {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('adminPasswordInput').value = '';
            }
        }

        function closeAdminModal() {
            document.getElementById('adminAuthModal').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';
        }

        function changeAdminPassword() {
            const newPass = document.getElementById('newAdminPass').value.trim();
            if (newPass.length < 4) { showNotification('Password must be at least 4 characters', 'error'); return; }
            localStorage.setItem('adminPassword', newPass);
            adminPassword = newPass;
            sessionStorage.setItem('isAdminAuth', 'true');
            isAdminAuth = true;
            showNotification('Admin password updated successfully!', 'success');
            addLog('Admin password changed');
            document.getElementById('newAdminPass').value = '';
        }

        // Handle Enter key in password modal
        document.getElementById('adminPasswordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAdminPassword();
        });

        // ===== PARTICIPANT SUBMISSION =====
        function hasSubmittedToday(id) {
            const today = getTodayKey();
            const list = submissions[today] || [];
            return list.some(s => s.id === parseInt(id));
        }

        function checkParticipantStatus() {
            const formStatus = document.getElementById('formStatus');
            const submitBtn = document.getElementById('submitBtn');
            const id = document.getElementById('partId').value;
            if (id && hasSubmittedToday(id)) {
                const today = getTodayKey();
                const entry = submissions[today].find(s => s.id == id);
                formStatus.innerHTML = `✅ Already submitted today at ${entry.submittedAt}. Waiting admin verification.`;
                formStatus.className = 'form-status success';
                submitBtn.disabled = true;
            }
        }

        document.getElementById('partId').addEventListener('input', checkParticipantStatus);

        function submitDailyEntry() {
            const id = document.getElementById('partId').value;
            const juz = document.getElementById('partJuz').value;
            const session = document.getElementById('partSession').value;
            const formStatus = document.getElementById('formStatus');
            const submitBtn = document.getElementById('submitBtn');

            if (!id || !juz || !session) {
                formStatus.innerHTML = '⚠️ Please fill all fields'; formStatus.className = 'form-status error'; return;
            }
            if (id < 1 || id > 30) {
                formStatus.innerHTML = '⚠️ ID must be between 1-30'; formStatus.className = 'form-status error'; return;
            }
            if (hasSubmittedToday(id)) {
                formStatus.innerHTML = '🔒 You already submitted today. Check back tomorrow!'; formStatus.className = 'form-status error'; return;
            }

            const now = new Date();
            const entry = {
                id: parseInt(id),
                name: profiles[id]?.name || `Reciter ${id}`,
                juz, session,
                submittedAt: now.toLocaleTimeString('en-US', {hour12:true}),
                status: 'pending'
            };

            const today = getTodayKey();
            if (!submissions[today]) submissions[today] = [];
            submissions[today].push(entry);
            localStorage.setItem('submissions', JSON.stringify(submissions));

            formStatus.innerHTML = `✅ Submitted successfully! Juz ${juz} | ${session} session.`;
            formStatus.className = 'form-status success';
            submitBtn.disabled = true;
            document.getElementById('partJuz').value = ''; document.getElementById('partSession').value = '';
            showNotification('Plan submitted successfully!', 'success');
            addLog(`[Participant] ID ${id} submitted Juz ${juz} (${session})`);
        }

        // ===== ADMIN VERIFICATION =====
        function renderAdminPanel() {
            const today = getTodayKey();
            const list = submissions[today] || [];
            const grid = document.getElementById('adminGrid');
            grid.innerHTML = '';

            let pending = 0, confirmed = 0, absent = 0, late = 0;
            list.forEach(s => {
                if (s.status === 'pending') pending++;
                else if (s.status === 'present') confirmed++;
                else if (s.status === 'absent') absent++;
                else if (s.status === 'late') late++;
            });

            document.getElementById('adminSummary').innerHTML = `
                <div class="summary-item"><div class="count total">${list.length}</div><div class="label">Total Submitted</div></div>
                <div class="summary-item"><div class="count pending">${pending}</div><div class="label">⏳ Pending</div></div>
                <div class="summary-item"><div class="count confirmed">${confirmed}</div><div class="label">✅ Present</div></div>
                <div class="summary-item"><div class="count absent">${absent}</div><div class="label">✗ Absent</div></div>
                <div class="summary-item"><div class="count late">${late}</div><div class="label">⏰ Late</div></div>
            `;

            if (list.length === 0) {
                grid.innerHTML = '<div class="no-data">No submissions for today yet. Waiting for participants...</div>';
                return;
            }

            list.forEach((s, idx) => {
                const isVerified = s.status !== 'pending';
                const card = document.createElement('div');
                card.className = 'admin-card';
                card.innerHTML = `
                    <div class="admin-card-header">
                        <span class="admin-card-id">ID: ${s.id}</span>
                        <span class="admin-card-name">${s.name}</span>
                    </div>
                    <div class="admin-card-details">
                        📖 <strong>Juz:</strong> ${s.juz}<br>
                        🌅 <strong>Session:</strong> ${s.session}<br>
                        ⏱️ <strong>Submitted:</strong> ${s.submittedAt}<br>
                        🏷️ <strong>Status:</strong> <span style="color:${s.status==='present'?'#2ecc71':s.status==='absent'?'#e74c3c':s.status==='late'?'#f39c12':'#3498db'}">${s.status.toUpperCase()}</span>
                    </div>
                    <div class="admin-card-actions">
                        <button class="verify-btn present ${isVerified ? 'verified' : ''}" onclick="verifyEntry(${idx}, 'present')" ${isVerified ? 'disabled' : ''}>✓ Present</button>
                        <button class="verify-btn absent ${isVerified ? 'verified' : ''}" onclick="verifyEntry(${idx}, 'absent')" ${isVerified ? 'disabled' : ''}>✗ Absent</button>
                        <button class="verify-btn late ${isVerified ? 'verified' : ''}" onclick="verifyEntry(${idx}, 'late')" ${isVerified ? 'disabled' : ''}>⏰ Late</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function verifyEntry(index, status) {
            const today = getTodayKey();
            if (submissions[today][index].status !== 'pending') return;
            
            submissions[today][index].status = status;
            localStorage.setItem('submissions', JSON.stringify(submissions));
            renderAdminPanel();
            const entry = submissions[today][index];
            showNotification(`ID ${entry.id} marked as ${status.toUpperCase()}`, status === 'present' ? 'success' : 'info');
            addLog(`[Admin] Verified ID ${entry.id} (${entry.name}) as ${status.toUpperCase()}`);
        }

        function exportTodayData() {
            const today = getTodayKey();
            const list = submissions[today] || [];
            if (list.length === 0) { showNotification('No data to export today', 'info'); return; }
            
            let csv = 'ID,Name,Juz,Session,Submitted Time,Status,Admin Email\n';
            list.forEach(s => {
                csv += `${s.id},${s.name},${s.juz},${s.session},${s.submittedAt},${s.status},${adminEmail || 'N/A'}\n`;
            });
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `Quran_Attendance_${today}.csv`; a.click();
            showNotification('Exported successfully!', 'success');
        }

        function resetTodayData() {
            if (!confirm('Clear all submissions for today? This cannot be undone.')) return;
            const today = getTodayKey();
            delete submissions[today];
            localStorage.setItem('submissions', JSON.stringify(submissions));
            renderAdminPanel();
            showNotification('Today\'s data cleared!', 'info');
            addLog('Admin cleared today\'s data');
        }

        // ===== LOOKUP & PROFILE =====
        function lookupReciter() {
            const input = document.getElementById('lookupInput').value.trim();
            const result = document.getElementById('lookupResult');
            if (!input) { showNotification('Enter ID or Name', 'error'); return; }

            let foundId = null;
            if (/^\d+$/.test(input)) foundId = parseInt(input);
            else {
                for (const [id, prof] of Object.entries(profiles)) {
                    if (prof.name.toLowerCase().includes(input.toLowerCase())) { foundId = parseInt(id); break; }
                }
            }

            if (!foundId || !profiles[foundId]) { result.innerHTML = '<p style="color:#e74c3c">Reciter not found in profiles.</p>'; result.classList.add('show'); return; }

            const prof = profiles[foundId];
            const today = getTodayKey();
            const entry = (submissions[today] || []).find(s => s.id === foundId);
            const status = entry ? entry.status.toUpperCase() : 'NO SUBMISSION TODAY';
            const details = entry ? `Juz: ${entry.juz} | Session: ${entry.session} | Time: ${entry.submittedAt}` : '-';

            result.innerHTML = `
                <p><strong>Name:</strong> ${prof.name}</p>
                <p><strong>Email:</strong> ${prof.email || 'N/A'}</p>
                <p><strong>Today's Status:</strong> <span style="color:${status==='PRESENT'?'#2ecc71':status==='ABSENT'?'#e74c3c':'#f39c12'}">${status}</span></p>
                <p><strong>Details:</strong> ${details}</p>
            `;
            result.classList.add('show');
        }

        function saveProfile() {
            const name = document.getElementById('profName').value.trim();
            const email = document.getElementById('profEmail').value.trim();
            const id = document.getElementById('profId').value;
            if (!name || !id) { showNotification('Name & ID are required', 'error'); return; }
            if (id < 1 || id > 30) { showNotification('ID must be 1-30', 'error'); return; }

            profiles[id] = { name, email, savedAt: new Date().toISOString() };
            localStorage.setItem('profiles', JSON.stringify(profiles));
            showNotification('Profile saved!', 'success');
            document.getElementById('profName').value = ''; document.getElementById('profEmail').value = ''; document.getElementById('profId').value = '';
            addLog(`Profile saved/updated: ID ${id} - ${name}`);
        }

        // ===== UTILS =====
        function addLog(msg) {
            const now = new Date();
            const timeStr = `${getTodayKey()} ${now.toLocaleTimeString('en-US', {hour12:true})}`;
            const logEl = document.getElementById('activityLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span>${msg}</span><span class="log-time">${timeStr}</span>`;
            logEl.insertBefore(entry, logEl.firstChild);
            while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
        }

        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            notif.textContent = msg; notif.className = `notification ${type} show`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function init() {
            addLog('System initialized. Ready for submissions.');
            checkParticipantStatus();
        }
        init();
    </script>
</body>
</html>
